<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lennar Podcast</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f2f2f2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #ffffff;
      border-radius: 20px;
      padding: 2.5rem 2rem;
      max-width: 440px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .logo-wrap { margin: 0 auto 1.5rem; }
    .logo-wrap img { width: 200px; height: auto; display: block; margin: 0 auto; }

    h1 {
      font-family: Georgia, Times, serif;
      font-size: 24px;
      font-weight: 400;
      margin-bottom: 0.4rem;
      color: #2d2d2d;
      line-height: 1.3;
    }

    .sub {
      font-size: 14px;
      color: #767676;
      margin-bottom: 1.75rem;
      line-height: 1.6;
    }

    .divider-line {
      border: none;
      border-top: 1px solid #e8e8e8;
      margin: 0 0 1.5rem;
    }

    .btn {
      display: flex;
      align-items: stretch;
      width: 100%;
      border-radius: 12px;
      border: none;
      font-family: Arial, Helvetica, sans-serif;
      cursor: pointer;
      margin-bottom: 10px;
      text-decoration: none;
      overflow: hidden;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn:active { transform: scale(0.98); opacity: 0.75; }

    .btn-logo {
      width: 62px;
      min-width: 62px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.15);
      padding: 14px 0;
    }

    .btn-viewlnn .btn-logo {
      background: transparent;
    }

    .btn-logo svg { width: 26px; height: 26px; }

    .btn-text {
      flex: 1;
      padding: 12px 16px;
      text-align: left;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .btn-eyebrow {
      display: block;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.05em;
      color: rgba(255,255,255,0.85);
      margin-bottom: 2px;
      text-transform: uppercase;
    }

    .btn-label {
      display: block;
      font-size: 17px;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.1;
    }

    .btn-apple   { background: #A847DB; }
    .btn-google  { background: #4285F4; }
    .btn-overcast { background: #FF9500; }
    .btn-viewlnn { background: #005daa; }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #767676;
      margin: 1.25rem 0 0.75rem;
    }

    .manual-box {
      background: #f2f2f2;
      border: 1px solid #d8d8d8;
      border-radius: 10px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      text-align: left;
    }

    .feed-url {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: #767676;
      flex: 1;
      word-break: break-all;
    }

    .copy-btn {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      background: #005daa;
      border: none;
      border-radius: 8px;
      padding: 6px 12px;
      color: #ffffff;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .copy-btn:hover { background: #003c77; }
    .copy-btn.copied { background: #009d4f; }

    .footer-mark {
      margin-top: 1.75rem;
      font-size: 11px;
      color: #aaaaaa;
      letter-spacing: 0.03em;
    }
  </style>
</head>

    const FEED = "https://feeds.resonaterecordings.com/lennar";
    const ua = navigator.userAgent || "";
    const isMac = /Mac/.test(ua) && !/iPhone|iPad/.test(ua);
    const isIOS = /iPhone|iPad/.test(ua);

    const appleBtn = document.getElementById("apple-btn");
    const overcastBtn = document.getElementById("overcast-btn");

    if (isIOS || isMac) {
      appleBtn.href = "podcast://" + FEED.replace("https://", "");
    } else {
      appleBtn.href = "https://podcasts.apple.com/search?term=" + encodeURIComponent(FEED);
      appleBtn.setAttribute("target", "_blank");
    }

    if (!isIOS && !isMac) {
      overcastBtn.href = "https://overcast.fm/itunes-search?q=" + encodeURIComponent(FEED);
      overcastBtn.setAttribute("target", "_blank");
    }

    function copyFeed() {
      navigator.clipboard.writeText(FEED).then(() => {
        const btn = document.getElementById("copyBtn");
        btn.textContent = "Copied!";
        btn.classList.add("copied");
        setTimeout(() => { btn.textContent = "Copy"; btn.classList.remove("copied"); }, 2000);
      });
    }
  </script>
</body>
</html>
